app = "your-unique-app-name" # Change this to something unique
primary_region = "iad" # iad is Washington D.C. (usually best for free)

[build]
  builder = "heroku/buildpacks:20" # This helps Fly find your Node.js code

[http_service]
  internal_port = 8080 # This MUST match the PORT in your index.js
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["http", "tls"]

  # This part is CRITICAL for your Bare Server/Proxy to work
  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20
